version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: pms_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-pms_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pms_password}
      POSTGRES_DB: ${DB_NAME:-pms_dev}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pms_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pms_network
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata

  # Redis Cache & Pub/Sub
  redis:
    image: redis:7-alpine
    container_name: pms_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pms_network

  # Redis Commander (UI for Redis)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: pms_redis_commander
    environment:
      - REDIS_HOSTS=local:redis:6379:0:${REDIS_PASSWORD:-redis_password}
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pms_network

  # Adminer (Database UI)
  adminer:
    image: adminer:latest
    container_name: pms_adminer
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pms_network

  # PMS API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pms_api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      WEBSOCKET_PORT: 3001
      
      # Database
      DATABASE_URL: postgresql://${DB_USER:-pms_user}:${DB_PASSWORD:-pms_password}@postgres:5432/${DB_NAME:-pms_dev}?schema=public
      
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
      REDIS_DB: 0
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      
      # API Configuration
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      
    ports:
      - "3000:3000"
      - "3001:3001"
    
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    volumes:
      - ./packages:/app/packages
      - ./node_modules:/app/node_modules
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    networks:
      - pms_network
    
    # Run migrations on startup
    command: >
      sh -c "
        cd packages/database &&
        npx prisma db push --skip-generate &&
        cd ../.. &&
        node packages/api/dist/index.js
      "

  # Development Web UI (Optional - Portainer-like)
  # Uncomment to enable a web-based container management UI
  # portainer:
  #   image: portainer/portainer-ce:latest
  #   container_name: pms_portainer
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #     - portainer_data:/data
  #   ports:
  #     - "9000:9000"
  #   networks:
  #     - pms_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  # portainer_data:
  #   driver: local

networks:
  pms_network:
    driver: bridge
